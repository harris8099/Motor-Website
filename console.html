<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Console</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="topbar-title" href="index.html">ESP32 Motor Dashboard</a>
      <div class="topbar-center">
        <a class="top-link" href="index.html">Home</a>
        <a class="top-link" href="log.html">Log</a>
        <a class="top-link" href="settings.html">Maintenance Settings</a>
        <a class="top-link" href="wifi.html">WiFi</a>
        <a class="top-link" href="console.html">Console</a>
        <a class="top-link" href="about.html">About</a>
      </div>
      <div class="topbar-right">
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle theme">🌙</button>
        <span class="status-indicator">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-txt" id="statusText">Connecting...</span>
        </span>
        <span class="timestamp" id="timestamp">--:--:--</span>
        <span class="date" id="date">--/--/----</span>
      </div>
    </div>

    <div class="dashboard-main">
      <section class="dashboard-panel">
        <div class="section-title">ESP32 Console Logs</div>
        <div class="section-content console-controls">
          <button id="pauseBtn" class="settings-btn" type="button">Pause</button>
          <button id="clearBtn" class="settings-btn" type="button">Clear View</button>
          <button id="downloadBtn" class="settings-btn" type="button">Download Logs</button>
          <select id="levelFilter" class="settings-input console-filter-select">
            <option value="all">All Levels</option>
            <option value="error">Error</option>
            <option value="warn">Warn</option>
            <option value="info">Info</option>
            <option value="debug">Debug</option>
            <option value="verbose">Verbose</option>
            <option value="other">Other</option>
          </select>
          <input id="searchInput" class="settings-input console-search-input" type="text" placeholder="Search logs...">
          <label class="settings-label console-checkbox-label">
            <input id="autoScroll" type="checkbox" checked> Auto-scroll
          </label>
          <span id="consoleMeta" class="settings-status">Waiting for logs...</span>
        </div>
        <div class="console-wrap">
          <pre id="consoleOutput" class="console-output"></pre>
        </div>
      </section>
    </div>
  </div>

  <script src="console.js"></script>
</body>
</html>
